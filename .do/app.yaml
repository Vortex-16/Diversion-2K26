  - rule: DOMAIN_FAILED

# ============================================================
# Notes for Deployment
# ============================================================
# 
# 1. Replace ALL instances of "YOUR_" with your actual values
# 2. Keep sensitive values (PRIVATE_KEY, MONGODB_URI) as SECRETs
# 3. Use doctl CLI or DigitalOcean dashboard to upload this spec
# 4. After first deployment, get PUBLIC URLs and update environment variables
# 
# CLI Deployment:
#   doctl apps create --spec .do/app.yaml
#   doctl apps update YOUR_APP_ID --spec .do/app.yaml
# 
# Dashboard Deployment:
#   1. Go to Apps → Create App
#   2. Choose "Import existing project from GitHub"
#   3. Select repository
#   4. Click "Edit your App Spec" → Paste this YAML
#   5. Review and Create
